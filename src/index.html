<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portifólio</title>
    <link href="./output.css" rel="stylesheet">
</head>
<body class="font-main">
    <header class="flex flex-row justify-between items-center px-8 py-9 bg-black text-white"> 
        <div class="flex flex-row items-center gap-4">
            <div class="size-12">
                <img src="./img/icon_logo.png" alt="logo do site">
            </div>
            <h1 class="text-4xl">Portifólio</h1>
        </div>
        <div class="size-8"><img src="./img/icon_hamburguer.png" alt=""></div>
    </header>

    <section class="text-black px-6 py-16 bg-white">
        <div class="max-w[400px] max-h[400px]">
            <img 
                src="./img/sally.png" 
                alt="imagem da sally, mascote da byron"
            />
        </div>
        <div class="flex flex-col gap-12">
            <div class="text-center flex flex-col items-center gap-8">
                <div class="flex flex-col gap-8">
                    <h2 class="text-5xl">Conheça a <span class="text-secondary">Sally</span></h2>
                    <div class="flex flex-col gap-4">
                        <h3 class="text-2xl">A mascote da <span class="text-secondary">byron.solutions!</span></h3>
                        <p class="text-base">Lorem ipsum dolor sit amet, consectetur adipiscing elit. Morbi interdum  aliquet lorem in mollis. Fusce sem urna, iaculis sit amet sagittis eget, egestas in tortor. Morbi at lectus arcu.</p>
                    </div>
                </div>
                <button class="text-2xl font-semibold text-white bg-main px-4 py-3 rounded-2xl hover:bg-teal-600 transition duration">SAIBA MAIS</button>
            </div>
            <div class="flex flex-row justify-between items-center">
                <p class="text-2xl">Nos contate!</p>
                <div class="flex flex-row gap-6" >
                    <div class="size-12">
                        <a href="">
                            <img src="./img/icon_instagram.png" alt="">
                        </a>
                    </div>
                    <div class="size-12">
                        <a href="">
                            <img src="./img/icon_linkedin.png" alt="">
                        </a>
                    </div>
                    <div class="size-12">
                        <a href="">
                            <img src="./img/icon_whatsapp.png" alt="">
                        </a>
                    </div>
                </div>
            </div>
        </div>
    </section>
</body>
</html>
